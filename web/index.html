<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptimAI Control Dashboard</title>
  <style>
    :root{--bg:#090d16;--text:#eaf2ff;--muted:#96a8c4;--line:rgba(148,163,184,.18);--panel:rgba(30,41,59,.94);--panel2:rgba(15,23,42,.96);--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a78bfa}
    *{box-sizing:border-box}html,body{width:100%;min-height:100%;overflow-x:hidden}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#172554 0,transparent 32%),var(--bg)}
    body.light-mode{--bg:#eef4ff;--text:#0f172a;--muted:#475569;--line:rgba(15,23,42,.14);--panel:rgba(255,255,255,.95);--panel2:rgba(241,245,249,.98);background:#eef4ff}
    body.compact-mode .card{padding:12px}body.compact-mode .metrics{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}body.compact-mode .metric{padding:8px}body.compact-mode .metric b{font-size:17px}body.compact-mode .grid{grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:12px}body.compact-mode .desktop-actions .btn{padding:7px 8px;font-size:11px}
    .app{min-height:100vh;display:block;padding-left:260px;transition:padding-left .22s ease}body.sidebar-collapsed .app{padding-left:84px}.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;height:100vh;padding:20px 14px 88px;background:rgba(13,20,37,.94);border-right:1px solid var(--line);z-index:10;overflow:visible;transition:width .22s ease}body.light-mode .sidebar{background:#ffffff}body.sidebar-collapsed .sidebar{width:84px}
    .brand{display:flex;align-items:center;gap:12px;padding:10px;margin-bottom:16px;min-height:62px;overflow:hidden}.logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#38bdf8,#8b5cf6);font-weight:900;color:#fff;flex:0 0 auto}.brand-text{min-width:0;white-space:nowrap;transition:opacity .18s ease,transform .18s ease}.brand h1{margin:0;font-size:17px;line-height:1.1}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}body.sidebar-collapsed .brand{justify-content:center;padding:10px 0}body.sidebar-collapsed .brand-text{opacity:0;width:0;overflow:hidden;transform:translateX(-8px)}
    .sidebar-toggle{position:absolute;top:18px;right:-15px;width:30px;height:30px;border:1px solid rgba(148,163,184,.32);color:#334155;background:#e5e7eb;border-radius:10px;cursor:pointer;font-weight:900;display:grid;place-items:center;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    .nav{display:grid;gap:8px;overflow:hidden}.nav button,.bottom-nav button{border:0;color:var(--muted);background:transparent;border-radius:12px;font-weight:800;cursor:pointer;white-space:nowrap;position:relative}.nav button{width:100%;padding:12px 13px;text-align:left;display:flex;align-items:center;gap:10px;overflow:hidden}.nav button:hover,.nav button.active,.bottom-nav button.active{color:var(--text);background:rgba(56,189,248,.14)}.nav-icon{width:22px;flex:0 0 22px;text-align:center}.nav-label{transition:opacity .16s ease,transform .16s ease}.nav-badge{margin-left:auto;background:#ef4444;color:#fff;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:950}body.sidebar-collapsed .nav button{justify-content:center;padding:13px 0;gap:0}body.sidebar-collapsed .nav-label,body.sidebar-collapsed .nav-badge{opacity:0;width:0;overflow:hidden;transform:translateX(-8px)}
    .sidebar-footer{position:absolute;left:14px;right:14px;bottom:18px}.logout-btn{width:100%;border:1px solid rgba(248,113,113,.28);background:rgba(220,38,38,.13);color:#fecaca;border-radius:14px;padding:12px 13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;overflow:hidden;white-space:nowrap}.logout-label{transition:opacity .16s ease,transform .16s ease}body.sidebar-collapsed .logout-label{opacity:0;width:0;overflow:hidden}
    .main{min-width:0;width:100%;padding:24px;max-width:1600px;margin:0 auto}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}.topbar h2{margin:0;font-size:clamp(22px,3vw,30px)}.topbar p{margin:6px 0 0;color:var(--muted);overflow-wrap:anywhere}.actions,.toolbar{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}.toolbar{justify-content:flex-start;margin-bottom:16px}.input,.select,.form-input{background:rgba(15,23,42,.92);color:#eaf2ff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;outline:none}body.light-mode .input,body.light-mode .select,body.light-mode .form-input{background:#fff;color:#0f172a}.btn{border:0;border-radius:12px;padding:11px 14px;color:white;background:#2563eb;cursor:pointer;font-weight:900;white-space:nowrap}.btn:hover{filter:brightness(1.08)}.btn.secondary{background:#334155}.btn.danger{background:#dc2626}.btn.ok{background:#16a34a}.btn.warn{background:#d97706}.btn.small{padding:8px 10px;font-size:12px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}.stat,.card,.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 42px rgba(0,0,0,.20)}.stat{padding:15px;min-height:96px;min-width:0;overflow:hidden}.label,.stat .label{color:var(--muted);font-size:12px;font-weight:800}.stat .value{font-size:clamp(24px,3.2vw,32px);font-weight:950;margin-top:8px;line-height:1.05;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px}.card{padding:16px;min-width:0}.card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}.card h3{margin:0;font-size:18px}.host{color:var(--muted);font-size:12px;margin-top:4px;word-break:break-all}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;white-space:nowrap}.badge.running{background:rgba(34,197,94,.14);color:#86efac}.badge.down{background:rgba(239,68,68,.14);color:#fecaca}.badge.warning{background:rgba(245,158,11,.14);color:#fde68a}.badge.danger{background:rgba(239,68,68,.18);color:#fecaca}.badge.healthy{background:rgba(34,197,94,.14);color:#86efac}.badge.unknown{background:rgba(167,139,250,.14);color:#ddd6fe}.badge.up{background:rgba(34,197,94,.14);color:#86efac}.badge.minus{background:rgba(239,68,68,.14);color:#fecaca}.badge.same{background:rgba(148,163,184,.14);color:#cbd5e1}
    .metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}.metric{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(15,23,42,.56);min-width:0}body.light-mode .metric{background:#f8fafc}.metric span{display:block;color:var(--muted);font-size:11px;font-weight:850}.metric b{display:block;font-size:20px;margin-top:3px}.card-actions{display:flex;gap:8px;flex-wrap:wrap}.mobile-action-btn{display:none}.panel{padding:18px;margin-bottom:18px;overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:620px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{color:var(--muted);font-size:12px;text-transform:uppercase}.hidden{display:none!important}.muted{color:var(--muted)}.form{display:grid;gap:14px}.form-row label{display:block;color:#bfdbfe;font-size:13px;font-weight:900;margin-bottom:7px}body.light-mode .form-row label{color:#1d4ed8}.form-input{width:100%}.form-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px}.notice{border:1px solid var(--line);background:rgba(56,189,248,.08);color:#dbeafe;border-radius:14px;padding:12px;font-size:13px}body.light-mode .notice{color:#0f172a}.modal{position:fixed;inset:0;background:rgba(2,6,23,.78);display:none;align-items:center;justify-content:center;padding:18px;z-index:99}.modal.show{display:flex}.modal-box{width:min(860px,100%);max-height:86vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:20px;padding:20px}body.light-mode .modal-box{background:#fff}pre{background:#020617;padding:14px;border-radius:14px;overflow:auto;color:#dbeafe;border:1px solid var(--line);white-space:pre-wrap}body.light-mode pre{background:#f8fafc;color:#0f172a}.bars{display:grid;gap:12px}.bar-row{display:grid;grid-template-columns:140px 1fr 80px;gap:10px;align-items:center}.bar-track{height:14px;background:rgba(15,23,42,.9);border-radius:999px;overflow:hidden;border:1px solid var(--line)}.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:999px}.live-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(34,197,94,.12);display:inline-block;margin-right:7px}.select-box{display:flex;gap:9px;align-items:center}.select-box input{width:18px;height:18px}.snapshot{background:linear-gradient(180deg,#111827,#0f172a);border:1px solid var(--line);border-radius:22px;padding:22px}.snapshot h2{margin:0 0 8px}.snapshot-grid,.compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px}.snapshot-card,.compare-card{border:1px solid var(--line);border-radius:16px;padding:14px}.snapshot-card b,.compare-card b{font-size:24px;display:block;margin-top:6px}.bottom-nav{display:none}.mobile-only{display:none}
    @media print{body>*:not(.modal){display:none!important}.modal{display:block;background:white}.modal-box{box-shadow:none;border:0;max-height:none;width:100%}.modal .topbar{display:none}}
    @media(max-width:1050px){.app,.app.sidebar-collapsed{display:block;padding-left:0}.sidebar{position:sticky;top:0;height:auto;width:100%;padding:10px 12px 12px;border-right:0;border-bottom:1px solid var(--line);overflow:hidden}.sidebar-toggle,.sidebar-footer{display:none}.brand{margin:0 0 8px;padding:4px 6px;min-height:auto}.brand-text{opacity:1!important;width:auto!important;transform:none!important}.brand p{display:none}.nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}.nav button{width:auto;flex:0 0 auto;padding:10px 12px;background:rgba(15,23,42,.55)}body.light-mode .nav button{background:#eef2ff}.nav-label,.nav-badge{opacity:1!important;width:auto!important;transform:none!important}.main{padding:18px 14px 28px}}
    @media(max-width:720px){body{padding-bottom:76px}.sidebar{display:none}.bottom-nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:60;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:rgba(15,23,42,.94);border:1px solid var(--line);border-radius:22px;padding:8px;box-shadow:0 16px 50px rgba(0,0,0,.35);backdrop-filter:blur(16px)}body.light-mode .bottom-nav{background:rgba(255,255,255,.95)}.bottom-nav button{padding:9px 4px;display:grid;place-items:center;font-size:12px}.bottom-nav .mini-label{font-size:10px;margin-top:3px}.main{padding:14px 10px 18px}.topbar{display:grid;gap:12px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg),rgba(9,13,22,.76));padding:10px 0 8px}.actions{justify-content:stretch}.actions .btn,.actions .select{flex:1 1 115px}.stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid{grid-template-columns:1fr}.bar-row{grid-template-columns:88px 1fr 56px}.panel{padding:14px;border-radius:16px}.desktop-actions{display:none}.mobile-action-btn{display:block;width:100%}.mobile-only{display:block}.card{border-radius:16px}.card-head{display:grid}.metrics{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.metric{padding:8px}.metric b{font-size:16px}table{min-width:560px}}
    @media(max-width:430px){.stats{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.btn.small{flex:1 1 90px}.modal{padding:10px}.modal-box{padding:14px;border-radius:16px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><span id="toggle-icon">◀</span></button>
      <div class="brand"><div class="logo">O</div><div class="brand-text"><h1>OptimAI Control</h1><p>Node dashboard</p></div></div>
      <div class="nav">
        <button class="active" data-page="overview"><span class="nav-icon">🏠</span><span class="nav-label">Overview</span><span class="nav-badge warn-badge hidden">0</span></button>
        <button data-page="nodes"><span class="nav-icon">🖥</span><span class="nav-label">VPS Nodes</span><span class="nav-badge warn-badge hidden">0</span></button>
        <button data-page="manage"><span class="nav-icon">🛠</span><span class="nav-label">Kelola VPS</span></button>
        <button data-page="ranking"><span class="nav-icon">🏆</span><span class="nav-label">Ranking</span></button>
        <button data-page="compare"><span class="nav-icon">🔁</span><span class="nav-label">Today vs Yesterday</span></button>
        <button data-page="charts"><span class="nav-icon">📊</span><span class="nav-label">Reward Chart</span></button>
        <button data-page="global"><span class="nav-icon">🌐</span><span class="nav-label">Global Command</span></button>
        <button data-page="daily"><span class="nav-icon">📅</span><span class="nav-label">Daily Report</span></button>
        <button data-page="weekly"><span class="nav-icon">📈</span><span class="nav-label">Weekly Report</span></button>
      </div>
      <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><span>🚪</span><span class="logout-label">Keluar</span></button></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div><h2 id="page-title">Overview</h2><p id="sub-title">Loading data...</p></div>
        <div class="actions"><span class="muted"><span class="live-dot"></span><span id="live-text">Live</span></span><select id="refresh-select" class="select" onchange="setAutoRefresh(this.value)"><option value="0">Auto: OFF</option><option value="30">30s</option><option value="60">1m</option><option value="300">5m</option></select><button class="btn secondary" onclick="toggleTheme()" id="theme-btn">Light</button><button class="btn secondary" onclick="toggleCompact()" id="compact-btn">Compact</button><button class="btn secondary" onclick="snapshotReport()">Snapshot</button><button class="btn secondary" onclick="loadAll()">Refresh</button></div>
      </div>
      <section id="overview" class="page"></section><section id="nodes" class="page hidden"></section><section id="manage" class="page hidden"></section><section id="ranking" class="page hidden"></section><section id="compare" class="page hidden"></section><section id="charts" class="page hidden"></section><section id="global" class="page hidden"></section><section id="daily" class="page hidden"></section><section id="weekly" class="page hidden"></section>
    </main>
  </div>

  <nav class="bottom-nav">
    <button class="active" data-page="overview"><span>🏠</span><span class="mini-label">Home</span></button>
    <button data-page="nodes"><span>🖥</span><span class="mini-label">Nodes</span></button>
    <button data-page="compare"><span>🔁</span><span class="mini-label">Compare</span></button>
    <button data-page="charts"><span>📊</span><span class="mini-label">Chart</span></button>
    <button data-page="global"><span>🌐</span><span class="mini-label">Global</span></button>
  </nav>

  <div id="modal" class="modal" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div class="topbar"><div><h2 id="modal-title">Detail</h2><p id="modal-sub" class="muted"></p></div><button class="btn secondary" onclick="hideModal()">Close</button></div><div id="modal-content"></div></div></div>

  <script>
    let state=null,currentPage='overview',editingName=null,autoTimer=null,selected=new Set();
    const rup=v=>{if(v==null)return'-';const n=Number(v);return Number.isNaN(n)?String(v):n.toLocaleString('en-US',{maximumFractionDigits:0})};
    const metric=(n,k)=>Number((n.metrics||{})[k]||0);
    const esc=t=>String(t??'').replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const diffBadge=d=>`<span class="badge ${d>0?'up':d<0?'minus':'same'}">${d>0?'+':''}${rup(d)}</span>`;
    function applySidebarState(){const c=localStorage.getItem('sidebarCollapsed')==='1';document.body.classList.toggle('sidebar-collapsed',c);document.getElementById('toggle-icon').textContent=c?'▶':'◀'}
    function toggleSidebar(){localStorage.setItem('sidebarCollapsed',localStorage.getItem('sidebarCollapsed')==='1'?'0':'1');applySidebarState()}applySidebarState();
    function applyModes(){document.body.classList.toggle('light-mode',localStorage.getItem('themeMode')==='light');document.body.classList.toggle('compact-mode',localStorage.getItem('compactMode')==='1');document.getElementById('theme-btn').textContent=localStorage.getItem('themeMode')==='light'?'Dark':'Light';document.getElementById('compact-btn').textContent=localStorage.getItem('compactMode')==='1'?'Normal':'Compact'}
    function toggleTheme(){localStorage.setItem('themeMode',localStorage.getItem('themeMode')==='light'?'dark':'light');applyModes()}function toggleCompact(){localStorage.setItem('compactMode',localStorage.getItem('compactMode')==='1'?'0':'1');applyModes()}applyModes();
    document.querySelectorAll('.nav button,.bottom-nav button').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));
    async function api(path,opt={}){const res=await fetch(path,opt);if(res.status===401){location.href='/login';throw new Error('Login required')}if(!res.ok){let m=await res.text();try{m=JSON.parse(m).detail||m}catch(e){}throw new Error(m)}return res.json()}
    async function loadAll(){document.getElementById('sub-title').textContent='Refreshing data from all VPS...';try{state=await api('/api/overview');renderAll()}catch(e){document.getElementById('sub-title').textContent='Error: '+e.message}}
    function setAutoRefresh(v){localStorage.setItem('autoRefresh',v);if(autoTimer)clearInterval(autoTimer);autoTimer=null;document.getElementById('live-text').textContent=v==='0'?'Manual':`Live ${v}s`;if(v!=='0')autoTimer=setInterval(loadAll,Number(v)*1000)}const savedRefresh=localStorage.getItem('autoRefresh')||'60';document.getElementById('refresh-select').value=savedRefresh;setAutoRefresh(savedRefresh);
    function setActiveNav(p){document.querySelectorAll('.nav button,.bottom-nav button').forEach(x=>x.classList.toggle('active',x.dataset.page===p))}
    function showPage(p){currentPage=p;document.querySelectorAll('.page').forEach(e=>e.classList.add('hidden'));document.getElementById(p).classList.remove('hidden');document.getElementById('page-title').textContent={overview:'Overview',nodes:'VPS Nodes',manage:'Kelola VPS',ranking:'Ranking Harian',compare:'Today vs Yesterday',charts:'Reward Chart',global:'Global Command',daily:'Daily Report',weekly:'Weekly Report'}[p];setActiveNav(p);renderAll()}
    function renderAll(){if(!state)return;document.getElementById('sub-title').textContent=`Last update: ${state.generated_at} | Date: ${state.date}`;updateBadges();renderOverview();renderNodes();renderManage();renderRanking();renderCompare();renderCharts();renderGlobal();renderDaily();renderWeekly()}
    function updateBadges(){const warn=Number(state.warning_count||0);document.querySelectorAll('.warn-badge').forEach(el=>{el.textContent=warn;el.classList.toggle('hidden',warn<=0)})}
    function statsHtml(){const t=state.totals||{};const stats=[['Total VPS',state.total_vps],['Running',state.running],['Down',state.down],['Warning',state.warning_count||0],['Task Unik',t.assignments],['Submit',t.submitted],['Gagal Final',t.failed],['Pending',t.pending],['Retry',t.retried],['Total Akun',state.account_total]];return `<div class="stats">${stats.map(([l,v])=>`<div class="stat"><div class="label">${l}</div><div class="value">${rup(v)}</div></div>`).join('')}</div>`}
    function ageLabel(s){if(s==null||s<0)return'-';if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';return (s/3600).toFixed(1)+'h'}
    function staleBadge(n){const st=n.stale||{};return `<span class="badge ${st.level||'unknown'}">${st.label||'Unknown'} ${st.age_seconds>=0?'('+ageLabel(st.age_seconds)+')':''}</span>`}
    function cardTop(n){return `<div class="card-head"><div><label class="select-box"><input type="checkbox" ${selected.has(n.name)?'checked':''} onchange="toggleSelect('${n.name}',this.checked)"><span><h3>${esc(n.name)}</h3><div class="host">${esc(n.host||'-')}</div></span></label></div><div style="display:grid;gap:6px;justify-items:end"><span class="badge ${n.status==='running'?'running':'down'}">${n.status==='running'?'✅ Running':'❌ Down'}</span>${staleBadge(n)}</div></div>`}
    function actionButtons(n){return `<button class="btn small secondary" onclick="detail('${n.name}')">Detail</button><button class="btn small ok" onclick="nodeAction('${n.name}','start')">Start</button><button class="btn small warn" onclick="nodeAction('${n.name}','stop')">Stop</button><button class="btn small danger" onclick="nodeAction('${n.name}','restart')">Restart</button><button class="btn small secondary" onclick="nodeAction('${n.name}','update_cli')">Update CLI</button><button class="btn small secondary" onclick="nodeAction('${n.name}','auto_heal')">Auto-Heal</button><button class="btn small secondary" onclick="mini('${n.name}')">Mini</button>`}
    function nodeCard(n){return `<div class="card" data-name="${esc(n.name)}">${cardTop(n)}<div class="metrics"><div class="metric"><span>Task</span><b>${metric(n,'assignments')}</b></div><div class="metric"><span>Submit</span><b>${metric(n,'submitted')}</b></div><div class="metric"><span>Gagal</span><b>${metric(n,'failed')}</b></div><div class="metric"><span>Pending</span><b>${metric(n,'pending')}</b></div><div class="metric"><span>Retry</span><b>${metric(n,'retried')}</b></div><div class="metric"><span>Success</span><b>${n.success_rate||0}%</b></div></div><div class="card-actions desktop-actions">${actionButtons(n)}</div><button class="btn secondary mobile-action-btn" onclick="openActionMenu('${n.name}')">Aksi VPS</button></div>`}
    function toggleSelect(name,on){on?selected.add(name):selected.delete(name);renderAll()}function selectAllVisible(){filteredNodes().forEach(n=>selected.add(n.name));renderNodes()}function clearSelected(){selected.clear();renderNodes()}function selectedNames(){return Array.from(selected)}
    function renderOverview(){const top=(state.top_nodes||[]).map((n,i)=>`<tr><td>${i+1}</td><td>${esc(n.name)}</td><td>${metric(n,'submitted')}</td><td>${metric(n,'assignments')}</td><td>${n.success_rate||0}%</td><td>${staleBadge(n)}</td></tr>`).join('');document.getElementById('overview').innerHTML=`${statsHtml()}<div class="panel"><h3>🏆 Top 5 Hari Ini</h3><table><thead><tr><th>#</th><th>Node</th><th>Submit</th><th>Task</th><th>Success</th><th>Live</th></tr></thead><tbody>${top}</tbody></table></div><div class="grid">${state.nodes.map(nodeCard).join('')}</div>`}
    function filteredNodes(){let list=[...state.nodes];const q=(document.getElementById('node-search')?.value||'').toLowerCase();const f=document.getElementById('node-filter')?.value||'all';const sort=document.getElementById('node-sort')?.value||'name';if(q)list=list.filter(n=>(n.name+' '+n.host).toLowerCase().includes(q));if(f==='running')list=list.filter(n=>n.status==='running');if(f==='down')list=list.filter(n=>n.status!=='running');if(f==='stale')list=list.filter(n=>['warning','danger','unknown'].includes(n.stale?.level));if(sort==='submit')list.sort((a,b)=>metric(b,'submitted')-metric(a,'submitted'));else if(sort==='task')list.sort((a,b)=>metric(b,'assignments')-metric(a,'assignments'));else if(sort==='gagal')list.sort((a,b)=>metric(b,'failed')-metric(a,'failed'));else list.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));return list}
    function renderNodes(){const old={q:document.getElementById('node-search')?.value||'',f:document.getElementById('node-filter')?.value||'all',s:document.getElementById('node-sort')?.value||'name'};document.getElementById('nodes').innerHTML=`<div class="panel"><div class="toolbar"><input id="node-search" class="input" placeholder="Search VPS / host..." oninput="renderNodes()"><select id="node-filter" class="select" onchange="renderNodes()"><option value="all">Semua</option><option value="running">Running</option><option value="down">Down</option><option value="stale">Stale / Warning</option></select><select id="node-sort" class="select" onchange="renderNodes()"><option value="name">Urut nama</option><option value="submit">Submit tertinggi</option><option value="task">Task tertinggi</option><option value="gagal">Gagal tertinggi</option></select><button class="btn secondary" onclick="selectAllVisible()">Select visible</button><button class="btn secondary" onclick="clearSelected()">Clear</button><span class="muted">Selected: ${selected.size}</span></div><div class="toolbar"><button class="btn ok" onclick="batchAction('start_all')">Start Selected</button><button class="btn warn" onclick="batchAction('stop_all')">Stop Selected</button><button class="btn danger" onclick="batchAction('restart_all',true)">Restart Selected</button><button class="btn secondary" onclick="batchAction('update_cli_all',true)">Update CLI Selected</button><button class="btn secondary" onclick="batchAction('auto_heal_all')">Auto-Heal Selected</button><button class="btn secondary" onclick="batchAction('reward_all')">Reward Selected</button></div><div class="grid">${filteredNodes().map(nodeCard).join('')}</div></div>`;document.getElementById('node-search').value=old.q;document.getElementById('node-filter').value=old.f;document.getElementById('node-sort').value=old.s}
    function renderManage(){const rows=[...state.nodes].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(n=>`<tr><td><b>${esc(n.name)}</b></td><td>${esc(n.host||'-')}</td><td>${n.status==='running'?'✅ Running':'❌ Down'}</td><td><button class="btn small secondary" onclick="openVpsForm('edit','${n.name}','${esc(n.host||'')}')">Edit</button> <button class="btn small danger" onclick="deleteVps('${n.name}')">Hapus</button></td></tr>`).join('');document.getElementById('manage').innerHTML=`<div class="panel"><div class="topbar"><div><h3>🛠 Kelola VPS</h3><p class="muted">Data ini sama dengan yang dipakai bot Telegram.</p></div><button class="btn ok" onclick="openVpsForm('add')">➕ Tambah VPS</button></div><table><thead><tr><th>Nama VPS</th><th>Host SSH</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    function renderRanking(){const rows=[...state.nodes].sort((a,b)=>metric(b,'submitted')-metric(a,'submitted')).map((n,i)=>`<tr><td>${i+1}</td><td>${esc(n.name)}</td><td>${n.status}</td><td>${metric(n,'submitted')}</td><td>${metric(n,'assignments')}</td><td>${metric(n,'failed')}</td><td>${n.success_rate||0}%</td><td>${staleBadge(n)}</td></tr>`).join('');document.getElementById('ranking').innerHTML=`<div class="panel"><table><thead><tr><th>#</th><th>Node</th><th>Status</th><th>Submit</th><th>Task</th><th>Gagal</th><th>Success</th><th>Live</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    function barRows(data,key='submitted'){const max=Math.max(1,...data.map(x=>Number(x[key]||0)));return `<div class="bars">${data.map(x=>`<div class="bar-row"><div>${esc(x.name||x.date)}</div><div class="bar-track"><div class="bar-fill" style="width:${(Number(x[key]||0)/max)*100}%"></div></div><b>${rup(x[key]||0)}</b></div>`).join('')}</div>`}
    async function renderCharts(){if(currentPage!=='charts')return;let daily='Loading...',reward='Loading...';try{const d=await api('/api/history/daily');const arr=(d.days||[]).map(([date,x])=>({date,submitted:x.totals?.submitted||0,account_total:x.account_total||0}));daily=barRows(arr,'submitted');reward=barRows(arr,'account_total')}catch(e){daily=e.message;reward=e.message}const top=[...state.nodes].sort((a,b)=>metric(b,'submitted')-metric(a,'submitted')).slice(0,14).map(n=>({name:n.name,submitted:metric(n,'submitted')}));document.getElementById('charts').innerHTML=`<div class="panel"><h3>📊 Submit per Node Hari Ini</h3>${barRows(top,'submitted')}</div><div class="panel"><h3>💰 Reward Chart / Total Akun Harian</h3>${reward}</div><div class="panel"><h3>📅 Submit Riwayat Harian</h3>${daily}</div>`}
    function dayBefore(dateStr){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)}
    async function renderCompare(){if(currentPage!=='compare')return;const el=document.getElementById('compare');el.innerHTML='<div class="panel">Loading comparison...</div>';try{const hist=await api('/api/history/daily');const map=Object.fromEntries(hist.days||[]);const yKey=dayBefore(state.date);const y=map[yKey]||{totals:{},nodes:{},account_total:null};const t=state.totals||{},yt=y.totals||{};const rows=['assignments','submitted','failed','pending','retried'].map(k=>`<tr><td>${k}</td><td>${rup(t[k]||0)}</td><td>${rup(yt[k]||0)}</td><td>${diffBadge((t[k]||0)-(yt[k]||0))}</td></tr>`).join('');const todayNodes=Object.fromEntries(state.nodes.map(n=>[n.name,n.metrics||{}]));const names=[...new Set([...Object.keys(todayNodes),...Object.keys(y.nodes||{})])];const nodeRows=names.map(name=>{const a=Number(todayNodes[name]?.submitted||0),b=Number(y.nodes?.[name]?.submitted||0);return {name,a,b,d:a-b}}).sort((x,z)=>Math.abs(z.d)-Math.abs(x.d)).slice(0,20).map(r=>`<tr><td>${esc(r.name)}</td><td>${r.a}</td><td>${r.b}</td><td>${diffBadge(r.d)}</td></tr>`).join('');const rewardDiff=(state.account_total??0)-(y.account_total??0);el.innerHTML=`<div class="panel"><h3>🔁 Today vs Yesterday</h3><p class="muted">Hari ini: ${state.date} • Kemarin: ${yKey}</p><div class="compare-grid"><div class="compare-card"><span>Submit Diff</span><b>${diffBadge((t.submitted||0)-(yt.submitted||0))}</b></div><div class="compare-card"><span>Task Diff</span><b>${diffBadge((t.assignments||0)-(yt.assignments||0))}</b></div><div class="compare-card"><span>Gagal Diff</span><b>${diffBadge((t.failed||0)-(yt.failed||0))}</b></div><div class="compare-card"><span>Reward Diff</span><b>${diffBadge(rewardDiff)}</b></div></div></div><div class="panel"><h3>Total Compare</h3><table><thead><tr><th>Metric</th><th>Today</th><th>Yesterday</th><th>Diff</th></tr></thead><tbody>${rows}<tr><td>Total Akun</td><td>${rup(state.account_total)}</td><td>${rup(y.account_total)}</td><td>${diffBadge(rewardDiff)}</td></tr></tbody></table></div><div class="panel"><h3>Top Perubahan Submit per VPS</h3><table><thead><tr><th>VPS</th><th>Today</th><th>Yesterday</th><th>Diff</th></tr></thead><tbody>${nodeRows}</tbody></table></div>`}catch(e){el.innerHTML=`<div class="panel">ERROR: ${esc(e.message)}</div>`}}
    function renderGlobal(){document.getElementById('global').innerHTML=`<div class="panel"><h3>🌐 Global Command</h3><p class="muted">Command aman yang dijalankan ke semua VPS satu per satu.</p><div class="toolbar"><button class="btn secondary" onclick="globalAction('status_all')">Status All</button><button class="btn secondary" onclick="globalAction('reward_all')">Reward All</button><button class="btn ok" onclick="globalAction('start_all')">Start All</button><button class="btn warn" onclick="globalAction('stop_all',true)">Stop All</button><button class="btn danger" onclick="globalAction('restart_all',true)">Restart All</button><button class="btn secondary" onclick="globalAction('update_cli_all',true)">Update CLI All</button><button class="btn secondary" onclick="globalAction('auto_heal_all')">Auto-Heal All</button></div><pre id="global-output">Belum ada output.</pre></div>`}
    async function renderDaily(){if(currentPage!=='daily')return;const data=await api('/api/history/daily');const rows=(data.days||[]).map(([date,d])=>`<tr><td>${date}</td><td>${d.totals.assignments||0}</td><td>${d.totals.submitted||0}</td><td>${d.totals.failed||0}</td><td>${d.totals.pending||0}</td><td>${rup(d.account_total)}</td></tr>`).join('');document.getElementById('daily').innerHTML=`<div class="panel"><table><thead><tr><th>Tanggal</th><th>Task</th><th>Submit</th><th>Gagal</th><th>Pending</th><th>Total Akun</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    async function renderWeekly(){if(currentPage!=='weekly')return;const d=await api('/api/history/weekly');const rows=Object.entries(d.nodes||{}).sort((a,b)=>(b[1].submitted||0)-(a[1].submitted||0)).map(([name,m],i)=>`<tr><td>${i+1}</td><td>${esc(name)}</td><td>${m.assignments||0}</td><td>${m.submitted||0}</td><td>${m.failed||0}</td><td>${m.pending||0}</td></tr>`).join('');document.getElementById('weekly').innerHTML=`<div class="panel"><h3>7 Hari: Task ${d.totals?.assignments||0} | Submit ${d.totals?.submitted||0} | Gagal ${d.totals?.failed||0}</h3><table><thead><tr><th>#</th><th>Node</th><th>Task</th><th>Submit</th><th>Gagal</th><th>Pending</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    async function nodeAction(name,action){if(['restart','stop','update_cli'].includes(action)&&!confirm(`Yakin ${action} ${name}?`))return;showModal(`Running ${action} ${name}...`,'');try{const r=await api(`/api/vps/${encodeURIComponent(name)}/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});document.getElementById('modal-title').textContent=`✅ ${action} selesai`;document.getElementById('modal-content').innerHTML=`<pre>${esc(r.output||JSON.stringify(r,null,2))}</pre>`;await loadAll()}catch(e){document.getElementById('modal-title').textContent='❌ Gagal';document.getElementById('modal-content').innerHTML=`<pre>${esc(e.message)}</pre>`}}
    async function runGlobal(action,names=null){const body={action};if(names)body.names=names;return api('/api/global-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}
    async function globalAction(action,confirmHard=false){if(confirmHard&&prompt('Ketik YES untuk lanjut')!=='YES')return;const out=document.getElementById('global-output');out.textContent='Running '+action+'...';try{const r=await runGlobal(action);out.textContent=formatResults(r);await loadAll()}catch(e){out.textContent='ERROR: '+e.message}}
    async function batchAction(action,confirmHard=false){const names=selectedNames();if(!names.length){alert('Pilih VPS dulu.');return}if(confirmHard&&prompt('Ketik YES untuk lanjut')!=='YES')return;showModal('Running '+action+' untuk selected VPS...','Selected: '+names.length);try{const r=await runGlobal(action,names);document.getElementById('modal-title').textContent='✅ Batch selesai';document.getElementById('modal-content').innerHTML=`<pre>${esc(formatResults(r))}</pre>`;await loadAll()}catch(e){document.getElementById('modal-title').textContent='❌ Batch gagal';document.getElementById('modal-content').innerHTML=`<pre>${esc(e.message)}</pre>`}}
    function formatResults(r){return (r.results||[]).map(x=>`### ${x.name} (${x.host})\n${x.output||'(no output)'}`).join('\n\n')||'(no result)'}
    function mini(name){showModal('🧰 Mini Terminal '+name,'Pilih command aman');document.getElementById('modal-content').innerHTML=`<div class="toolbar"><select id="mini-cmd" class="select"><option value="status">Status service</option><option value="reward">Reward balance</option><option value="ram">RAM</option><option value="disk">Disk</option><option value="docker">Docker</option><option value="logs">Logs terbaru</option><option value="errors">Error 6 jam</option><option value="version">CLI version</option></select><button class="btn" onclick="runMini('${name}')">Run</button></div><pre id="mini-output">Pilih command lalu Run.</pre>`}
    async function runMini(name){const c=document.getElementById('mini-cmd').value,o=document.getElementById('mini-output');o.textContent='Running...';try{const r=await api(`/api/vps/${encodeURIComponent(name)}/mini-command`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:c})});o.textContent=r.output||'(no output)'}catch(e){o.textContent='ERROR: '+e.message}}
    function openActionMenu(name){const n=state.nodes.find(x=>x.name===name);showModal('⚙️ Aksi '+name,n?.host||'');document.getElementById('modal-content').innerHTML=`<div class="card-actions">${actionButtons(n||{name})}</div>`}
    function snapshotReport(){if(!state)return;const t=state.totals||{};showModal('📸 Snapshot Report','Siap screenshot / print');document.getElementById('modal-content').innerHTML=`<div class="snapshot"><h2>OptimAI Daily Snapshot</h2><p>${state.date} • Source saldo: ${esc(state.source_node||'-')}</p><div class="snapshot-grid"><div class="snapshot-card"><span>Total VPS</span><b>${state.total_vps}</b></div><div class="snapshot-card"><span>Running</span><b>${state.running}</b></div><div class="snapshot-card"><span>Warning</span><b>${state.warning_count||0}</b></div><div class="snapshot-card"><span>Task</span><b>${t.assignments||0}</b></div><div class="snapshot-card"><span>Submit</span><b>${t.submitted||0}</b></div><div class="snapshot-card"><span>Gagal</span><b>${t.failed||0}</b></div><div class="snapshot-card"><span>Total Akun</span><b>${rup(state.account_total)}</b></div></div></div><div class="toolbar" style="margin-top:14px"><button class="btn" onclick="window.print()">Print / Save PDF</button><button class="btn secondary" onclick="hideModal()">Tutup</button></div>`}
    function openVpsForm(mode,name='',host=''){editingName=mode==='edit'?name:null;showModal(mode==='edit'?'✏️ Edit VPS':'➕ Tambah VPS',mode==='edit'?name:'Isi data VPS baru');document.getElementById('modal-content').innerHTML=`<div class="form"><div class="notice">Password SSH hanya dipakai sekali untuk pasang SSH key. Password tidak disimpan. Kosongkan jika key sudah terpasang.</div><div class="form-row"><label>Nama VPS</label><input id="vps-name" class="form-input" placeholder="contoh: OptimAI_15" value="${esc(name)}"></div><div class="form-row"><label>Masukkan Host SSH</label><input id="vps-host" class="form-input" placeholder="contoh: root@1.2.3.4" value="${host}"></div><div class="form-row"><label>Masukkan Password SSH</label><input id="vps-pass" class="form-input" type="password" placeholder="kosongkan jika SSH key sudah ada"></div><div id="form-status" class="muted"></div><div class="form-actions"><button class="btn secondary" onclick="hideModal()">Batal</button><button class="btn ok" onclick="saveVpsForm()">Simpan</button></div></div>`}
    async function saveVpsForm(){const payload={name:document.getElementById('vps-name').value.trim(),host:document.getElementById('vps-host').value.trim(),password:document.getElementById('vps-pass').value};const s=document.getElementById('form-status');s.textContent='Menyimpan...';try{await api(editingName?'/api/vps/'+encodeURIComponent(editingName):'/api/vps',{method:editingName?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});await loadAll();hideModal();showPage('manage')}catch(e){s.textContent='❌ '+e.message}}
    async function deleteVps(name){if(!confirm('Yakin hapus '+name+'?'))return;try{await api('/api/vps/'+encodeURIComponent(name),{method:'DELETE'});selected.delete(name);await loadAll();showPage('manage')}catch(e){alert('Gagal hapus: '+e.message)}}
    async function detail(name){showModal('Loading detail...','');const n=await api('/api/vps/'+encodeURIComponent(name));document.getElementById('modal-title').textContent='🔎 Detail '+name;document.getElementById('modal-sub').textContent=n.host||'';document.getElementById('modal-content').innerHTML=`<div class="grid">${nodeCard(n)}</div><pre>${esc(JSON.stringify(n.system||{},null,2))}</pre>`}
    async function logs(name){showModal('Loading logs...','');const r=await api('/api/vps/'+encodeURIComponent(name)+'/logs');document.getElementById('modal-title').textContent='📜 Logs '+name;document.getElementById('modal-content').innerHTML=`<pre>${esc(r.output||'No logs')}</pre>`}
    async function logout(){if(!confirm('Keluar dari dashboard?'))return;try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/login'}function showModal(t,s){document.getElementById('modal-title').textContent=t;document.getElementById('modal-sub').textContent=s||'';document.getElementById('modal-content').innerHTML='';document.getElementById('modal').classList.add('show')}function hideModal(){document.getElementById('modal').classList.remove('show');editingName=null}function closeModal(e){if(e.target.id==='modal')hideModal()}loadAll();
  </script>
</body>
</html>
