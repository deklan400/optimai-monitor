<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptimAI Control Dashboard</title>
  <style>
    :root{--bg:#090d16;--card:#111a2d;--card2:#172238;--text:#eaf2ff;--muted:#96a8c4;--line:rgba(148,163,184,.18);--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a78bfa}*{box-sizing:border-box}html,body{width:100%;min-height:100%;overflow-x:hidden}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#172554 0,transparent 32%),var(--bg)}.app{min-height:100vh;display:block;padding-left:260px;transition:padding-left .22s ease}body.sidebar-collapsed .app{padding-left:84px}.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;height:100vh;padding:20px 14px 88px;background:rgba(13,20,37,.94);border-right:1px solid var(--line);z-index:10;overflow:visible;transition:width .22s ease}body.sidebar-collapsed .sidebar{width:84px}.brand{display:flex;align-items:center;gap:12px;padding:10px;margin-bottom:16px;min-height:62px;overflow:hidden}.logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#38bdf8,#8b5cf6);font-weight:900;color:#fff;flex:0 0 auto}.brand-text{min-width:0;white-space:nowrap;transition:opacity .18s ease,transform .18s ease}.brand h1{margin:0;font-size:17px;line-height:1.1}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}body.sidebar-collapsed .brand{justify-content:center;padding:10px 0}body.sidebar-collapsed .brand-text{opacity:0;width:0;overflow:hidden;transform:translateX(-8px)}.sidebar-toggle{position:absolute;top:18px;right:-15px;width:30px;height:30px;border:1px solid rgba(148,163,184,.32);color:#334155;background:#e5e7eb;border-radius:10px;cursor:pointer;font-weight:900;display:grid;place-items:center;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.25)}.nav{display:grid;gap:8px;overflow:hidden}.nav button{width:100%;border:0;color:var(--muted);background:transparent;border-radius:12px;padding:12px 13px;text-align:left;font-weight:800;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:10px;overflow:hidden}.nav button:hover,.nav button.active{color:var(--text);background:rgba(56,189,248,.14)}.nav-icon{width:22px;flex:0 0 22px;text-align:center}.nav-label{transition:opacity .16s ease,transform .16s ease}body.sidebar-collapsed .nav button{justify-content:center;padding:13px 0;gap:0}body.sidebar-collapsed .nav-label{opacity:0;width:0;overflow:hidden;transform:translateX(-8px)}.sidebar-footer{position:absolute;left:14px;right:14px;bottom:18px}.logout-btn{width:100%;border:1px solid rgba(248,113,113,.28);background:rgba(220,38,38,.13);color:#fecaca;border-radius:14px;padding:12px 13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;overflow:hidden;white-space:nowrap}.logout-label{transition:opacity .16s ease,transform .16s ease}body.sidebar-collapsed .logout-label{opacity:0;width:0;overflow:hidden}.main{min-width:0;width:100%;padding:24px;max-width:1600px;margin:0 auto}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}.topbar h2{margin:0;font-size:clamp(22px,3vw,30px)}.topbar p{margin:6px 0 0;color:var(--muted);overflow-wrap:anywhere}.actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}.input,.select,.form-input{background:rgba(15,23,42,.92);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px 12px;outline:none}.btn{border:0;border-radius:12px;padding:11px 14px;color:white;background:#2563eb;cursor:pointer;font-weight:900;white-space:nowrap}.btn:hover{filter:brightness(1.08)}.btn.secondary{background:#334155}.btn.danger{background:#dc2626}.btn.ok{background:#16a34a}.btn.warn{background:#d97706}.btn.small{padding:8px 10px;font-size:12px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}.stat,.card,.panel{background:linear-gradient(180deg,rgba(30,41,59,.94),rgba(15,23,42,.96));border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 42px rgba(0,0,0,.20)}.stat{padding:15px;min-height:96px;min-width:0;overflow:hidden}.label,.stat .label{color:var(--muted);font-size:12px;font-weight:800}.stat .value{font-size:clamp(24px,3.2vw,32px);font-weight:950;margin-top:8px;line-height:1.05;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px}.card{padding:16px;min-width:0}.card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}.card h3{margin:0;font-size:18px}.host{color:var(--muted);font-size:12px;margin-top:4px;word-break:break-all}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;white-space:nowrap}.badge.running{background:rgba(34,197,94,.14);color:#86efac}.badge.down{background:rgba(239,68,68,.14);color:#fecaca}.badge.warning{background:rgba(245,158,11,.14);color:#fde68a}.badge.danger{background:rgba(239,68,68,.18);color:#fecaca}.badge.healthy{background:rgba(34,197,94,.14);color:#86efac}.badge.unknown{background:rgba(167,139,250,.14);color:#ddd6fe}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}.metric{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(15,23,42,.56);min-width:0}.metric span{display:block;color:var(--muted);font-size:11px;font-weight:850}.metric b{display:block;font-size:20px;margin-top:3px}.card-actions{display:flex;gap:8px;flex-wrap:wrap}.panel{padding:18px;margin-bottom:18px;overflow-x:auto}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}table{width:100%;border-collapse:collapse;min-width:620px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{color:var(--muted);font-size:12px;text-transform:uppercase}.hidden{display:none!important}.muted{color:var(--muted)}.form{display:grid;gap:14px}.form-row label{display:block;color:#bfdbfe;font-size:13px;font-weight:900;margin-bottom:7px}.form-input{width:100%}.form-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px}.notice{border:1px solid var(--line);background:rgba(56,189,248,.08);color:#dbeafe;border-radius:14px;padding:12px;font-size:13px}.modal{position:fixed;inset:0;background:rgba(2,6,23,.78);display:none;align-items:center;justify-content:center;padding:18px;z-index:99}.modal.show{display:flex}.modal-box{width:min(780px,100%);max-height:86vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:20px;padding:20px}pre{background:#020617;padding:14px;border-radius:14px;overflow:auto;color:#dbeafe;border:1px solid var(--line);white-space:pre-wrap}.bars{display:grid;gap:12px}.bar-row{display:grid;grid-template-columns:120px 1fr 72px;gap:10px;align-items:center}.bar-track{height:14px;background:rgba(15,23,42,.9);border-radius:999px;overflow:hidden;border:1px solid var(--line)}.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:999px}.live-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(34,197,94,.12);display:inline-block;margin-right:7px}@media(max-width:1050px){.app,.app.sidebar-collapsed{display:block;padding-left:0}.sidebar{position:sticky;top:0;height:auto;width:100%;padding:10px 12px 12px;border-right:0;border-bottom:1px solid var(--line);overflow:hidden}.sidebar-toggle,.sidebar-footer{display:none}.brand{margin:0 0 8px;padding:4px 6px;min-height:auto}.brand-text{opacity:1!important;width:auto!important;transform:none!important}.brand p{display:none}.nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}.nav button{width:auto;flex:0 0 auto;padding:10px 12px;background:rgba(15,23,42,.55)}.nav-label{opacity:1!important;width:auto!important;transform:none!important}.main{padding:18px 14px 28px}}@media(max-width:720px){.topbar{display:grid}.actions{justify-content:stretch}.stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid{grid-template-columns:1fr}.bar-row{grid-template-columns:90px 1fr 55px}}@media(max-width:430px){.stats{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.card-head{display:grid}.btn.small{flex:1 1 90px}}
  </style>
</head>
<body>
  <div class="app"><aside class="sidebar"><button class="sidebar-toggle" onclick="toggleSidebar()"><span id="toggle-icon">◀</span></button><div class="brand"><div class="logo">O</div><div class="brand-text"><h1>OptimAI Control</h1><p>Node dashboard</p></div></div><div class="nav"><button class="active" data-page="overview"><span class="nav-icon">🏠</span><span class="nav-label">Overview</span></button><button data-page="nodes"><span class="nav-icon">🖥</span><span class="nav-label">VPS Nodes</span></button><button data-page="manage"><span class="nav-icon">🛠</span><span class="nav-label">Kelola VPS</span></button><button data-page="ranking"><span class="nav-icon">🏆</span><span class="nav-label">Ranking</span></button><button data-page="charts"><span class="nav-icon">📊</span><span class="nav-label">Grafik Harian</span></button><button data-page="global"><span class="nav-icon">🌐</span><span class="nav-label">Global Command</span></button><button data-page="daily"><span class="nav-icon">📅</span><span class="nav-label">Daily Report</span></button><button data-page="weekly"><span class="nav-icon">📈</span><span class="nav-label">Weekly Report</span></button></div><div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><span>🚪</span><span class="logout-label">Keluar</span></button></div></aside><main class="main"><div class="topbar"><div><h2 id="page-title">Overview</h2><p id="sub-title">Loading data...</p></div><div class="actions"><span class="muted"><span class="live-dot"></span><span id="live-text">Live</span></span><select id="refresh-select" class="select" onchange="setAutoRefresh(this.value)"><option value="0">Auto: OFF</option><option value="30">30s</option><option value="60">1m</option><option value="300">5m</option></select><button class="btn secondary" onclick="loadAll()">Refresh</button></div></div><section id="overview" class="page"></section><section id="nodes" class="page hidden"></section><section id="manage" class="page hidden"></section><section id="ranking" class="page hidden"></section><section id="charts" class="page hidden"></section><section id="global" class="page hidden"></section><section id="daily" class="page hidden"></section><section id="weekly" class="page hidden"></section></main></div><div id="modal" class="modal" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div class="topbar"><div><h2 id="modal-title">Detail</h2><p id="modal-sub" class="muted"></p></div><button class="btn secondary" onclick="hideModal()">Close</button></div><div id="modal-content"></div></div></div>
  <script>
    let state=null,currentPage='overview',editingName=null,autoTimer=null;const rup=v=>{if(v==null)return'-';const n=Number(v);return Number.isNaN(n)?String(v):n.toLocaleString('en-US',{maximumFractionDigits:0})};const metric=(n,k)=>Number((n.metrics||{})[k]||0);const esc=t=>String(t??'').replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function applySidebarState(){const c=localStorage.getItem('sidebarCollapsed')==='1';document.body.classList.toggle('sidebar-collapsed',c);document.getElementById('toggle-icon').textContent=c?'▶':'◀'}function toggleSidebar(){localStorage.setItem('sidebarCollapsed',localStorage.getItem('sidebarCollapsed')==='1'?'0':'1');applySidebarState()}applySidebarState();
    document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');showPage(b.dataset.page)}));
    async function api(path,opt={}){const res=await fetch(path,opt);if(res.status===401){location.href='/login';throw new Error('Login required')}if(!res.ok){let m=await res.text();try{m=JSON.parse(m).detail||m}catch(e){}throw new Error(m)}return res.json()}
    async function loadAll(){document.getElementById('sub-title').textContent='Refreshing data from all VPS...';try{state=await api('/api/overview');renderAll()}catch(e){document.getElementById('sub-title').textContent='Error: '+e.message}}
    function setAutoRefresh(v){localStorage.setItem('autoRefresh',v);if(autoTimer)clearInterval(autoTimer);autoTimer=null;document.getElementById('live-text').textContent=v==='0'?'Manual':`Live ${v}s`;if(v!=='0')autoTimer=setInterval(loadAll,Number(v)*1000)}const savedRefresh=localStorage.getItem('autoRefresh')||'60';document.getElementById('refresh-select').value=savedRefresh;setAutoRefresh(savedRefresh);
    function showPage(p){currentPage=p;document.querySelectorAll('.page').forEach(e=>e.classList.add('hidden'));document.getElementById(p).classList.remove('hidden');document.getElementById('page-title').textContent={overview:'Overview',nodes:'VPS Nodes',manage:'Kelola VPS',ranking:'Ranking Harian',charts:'Grafik Harian',global:'Global Command',daily:'Daily Report',weekly:'Weekly Report'}[p];renderAll()}
    function renderAll(){if(!state)return;document.getElementById('sub-title').textContent=`Last update: ${state.generated_at} | Date: ${state.date}`;renderOverview();renderNodes();renderManage();renderRanking();renderCharts();renderGlobal();renderDaily();renderWeekly()}
    function statsHtml(){const t=state.totals||{};const s=[['Total VPS',state.total_vps],['Running',state.running],['Down',state.down],['Stale',state.stale],['Task Unik',t.assignments],['Submit',t.submitted],['Gagal Final',t.failed],['Pending',t.pending],['Retry',t.retried],['Total Akun',state.account_total]];return `<div class="stats">${s.map(([l,v])=>`<div class="stat"><div class="label">${l}</div><div class="value">${rup(v)}</div></div>`).join('')}</div>`}
    function ageLabel(s){if(s==null||s<0)return'-';if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';return (s/3600).toFixed(1)+'h'}
    function staleBadge(n){const st=n.stale||{};return `<span class="badge ${st.level||'unknown'}">${st.label||'Unknown'} ${st.age_seconds>=0?'('+ageLabel(st.age_seconds)+')':''}</span>`}
    function nodeCard(n){const status=n.status==='running'?'running':'down';return `<div class="card" data-name="${esc(n.name)}"><div class="card-head"><div><h3>${esc(n.name)}</h3><div class="host">${esc(n.host||'-')}</div></div><div style="display:grid;gap:6px;justify-items:end"><span class="badge ${status}">${status==='running'?'✅ Running':'❌ Down'}</span>${staleBadge(n)}</div></div><div class="metrics"><div class="metric"><span>Task</span><b>${metric(n,'assignments')}</b></div><div class="metric"><span>Submit</span><b>${metric(n,'submitted')}</b></div><div class="metric"><span>Gagal</span><b>${metric(n,'failed')}</b></div><div class="metric"><span>Pending</span><b>${metric(n,'pending')}</b></div><div class="metric"><span>Retry</span><b>${metric(n,'retried')}</b></div><div class="metric"><span>Success</span><b>${n.success_rate||0}%</b></div></div><div class="card-actions"><button class="btn small secondary" onclick="detail('${n.name}')">Detail</button><button class="btn small ok" onclick="nodeAction('${n.name}','start')">Start</button><button class="btn small warn" onclick="nodeAction('${n.name}','stop')">Stop</button><button class="btn small danger" onclick="nodeAction('${n.name}','restart')">Restart</button><button class="btn small secondary" onclick="nodeAction('${n.name}','reward')">Reward</button><button class="btn small secondary" onclick="mini('${n.name}')">Mini</button><button class="btn small secondary" onclick="logs('${n.name}')">Logs</button></div></div>`}
    function renderOverview(){const top=(state.top_nodes||[]).map((n,i)=>`<tr><td>${i+1}</td><td>${esc(n.name)}</td><td>${metric(n,'submitted')}</td><td>${metric(n,'assignments')}</td><td>${n.success_rate||0}%</td><td>${staleBadge(n)}</td></tr>`).join('');document.getElementById('overview').innerHTML=`${statsHtml()}<div class="panel"><h3>🏆 Top 5 Hari Ini</h3><table><thead><tr><th>#</th><th>Node</th><th>Submit</th><th>Task</th><th>Success</th><th>Live</th></tr></thead><tbody>${top}</tbody></table></div><div class="grid">${state.nodes.map(nodeCard).join('')}</div>`}
    function filteredNodes(){let list=[...state.nodes];const q=(document.getElementById('node-search')?.value||'').toLowerCase();const f=document.getElementById('node-filter')?.value||'all';const sort=document.getElementById('node-sort')?.value||'name';if(q)list=list.filter(n=>(n.name+' '+n.host).toLowerCase().includes(q));if(f==='running')list=list.filter(n=>n.status==='running');if(f==='down')list=list.filter(n=>n.status!=='running');if(f==='stale')list=list.filter(n=>['warning','danger','unknown'].includes(n.stale?.level));if(sort==='submit')list.sort((a,b)=>metric(b,'submitted')-metric(a,'submitted'));else if(sort==='task')list.sort((a,b)=>metric(b,'assignments')-metric(a,'assignments'));else if(sort==='gagal')list.sort((a,b)=>metric(b,'failed')-metric(a,'failed'));else list.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));return list}
    function renderNodes(){const html=`<div class="panel"><div class="toolbar"><input id="node-search" class="input" placeholder="Search VPS / host..." oninput="renderNodes()"><select id="node-filter" class="select" onchange="renderNodes()"><option value="all">Semua</option><option value="running">Running</option><option value="down">Down</option><option value="stale">Stale / Warning</option></select><select id="node-sort" class="select" onchange="renderNodes()"><option value="name">Urut nama</option><option value="submit">Submit tertinggi</option><option value="task">Task tertinggi</option><option value="gagal">Gagal tertinggi</option></select></div><div class="grid">${filteredNodes().map(nodeCard).join('')}</div></div>`;const oldQ=document.getElementById('node-search')?.value,oldF=document.getElementById('node-filter')?.value,oldS=document.getElementById('node-sort')?.value;document.getElementById('nodes').innerHTML=html;if(oldQ)document.getElementById('node-search').value=oldQ;if(oldF)document.getElementById('node-filter').value=oldF;if(oldS)document.getElementById('node-sort').value=oldS}
    function renderManage(){const rows=[...state.nodes].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(n=>`<tr><td><b>${esc(n.name)}</b></td><td>${esc(n.host||'-')}</td><td>${n.status==='running'?'✅ Running':'❌ Down'}</td><td><button class="btn small secondary" onclick="openVpsForm('edit','${n.name}','${esc(n.host||'')}')">Edit</button> <button class="btn small danger" onclick="deleteVps('${n.name}')">Hapus</button></td></tr>`).join('');document.getElementById('manage').innerHTML=`<div class="panel"><div class="topbar"><div><h3>🛠 Kelola VPS</h3><p class="muted">Data ini sama dengan yang dipakai bot Telegram.</p></div><button class="btn ok" onclick="openVpsForm('add')">➕ Tambah VPS</button></div><table><thead><tr><th>Nama VPS</th><th>Host SSH</th><th>Status</th><th>Aksi</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    function renderRanking(){const rows=[...state.nodes].sort((a,b)=>metric(b,'submitted')-metric(a,'submitted')).map((n,i)=>`<tr><td>${i+1}</td><td>${esc(n.name)}</td><td>${n.status}</td><td>${metric(n,'submitted')}</td><td>${metric(n,'assignments')}</td><td>${metric(n,'failed')}</td><td>${n.success_rate||0}%</td><td>${staleBadge(n)}</td></tr>`).join('');document.getElementById('ranking').innerHTML=`<div class="panel"><table><thead><tr><th>#</th><th>Node</th><th>Status</th><th>Submit</th><th>Task</th><th>Gagal</th><th>Success</th><th>Live</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    function barRows(data,key='submitted'){const max=Math.max(1,...data.map(x=>Number(x[key]||0)));return `<div class="bars">${data.map(x=>`<div class="bar-row"><div>${esc(x.name||x.date)}</div><div class="bar-track"><div class="bar-fill" style="width:${(Number(x[key]||0)/max)*100}%"></div></div><b>${x[key]||0}</b></div>`).join('')}</div>`}
    async function renderCharts(){if(currentPage!=='charts')return;let daily='Loading...';try{const d=await api('/api/history/daily');daily=barRows((d.days||[]).map(([date,x])=>({date,submitted:x.totals?.submitted||0})), 'submitted')}catch(e){daily=e.message}const top=[...state.nodes].sort((a,b)=>metric(b,'submitted')-metric(a,'submitted')).slice(0,14).map(n=>({name:n.name,submitted:metric(n,'submitted')}));document.getElementById('charts').innerHTML=`<div class="panel"><h3>📊 Submit per Node Hari Ini</h3>${barRows(top,'submitted')}</div><div class="panel"><h3>📅 Submit Riwayat Harian</h3>${daily}</div>`}
    function renderGlobal(){document.getElementById('global').innerHTML=`<div class="panel"><h3>🌐 Global Command</h3><p class="muted">Command aman yang dijalankan ke semua VPS satu per satu.</p><div class="toolbar"><button class="btn secondary" onclick="globalAction('status_all')">Status All</button><button class="btn secondary" onclick="globalAction('reward_all')">Reward All</button><button class="btn ok" onclick="globalAction('start_all')">Start All</button><button class="btn danger" onclick="globalAction('restart_all',true)">Restart All</button></div><pre id="global-output">Belum ada output.</pre></div>`}
    async function renderDaily(){if(currentPage!=='daily')return;const data=await api('/api/history/daily');const rows=(data.days||[]).map(([date,d])=>`<tr><td>${date}</td><td>${d.totals.assignments||0}</td><td>${d.totals.submitted||0}</td><td>${d.totals.failed||0}</td><td>${d.totals.pending||0}</td><td>${rup(d.account_total)}</td></tr>`).join('');document.getElementById('daily').innerHTML=`<div class="panel"><table><thead><tr><th>Tanggal</th><th>Task</th><th>Submit</th><th>Gagal</th><th>Pending</th><th>Total Akun</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    async function renderWeekly(){if(currentPage!=='weekly')return;const d=await api('/api/history/weekly');const rows=Object.entries(d.nodes||{}).sort((a,b)=>(b[1].submitted||0)-(a[1].submitted||0)).map(([name,m],i)=>`<tr><td>${i+1}</td><td>${esc(name)}</td><td>${m.assignments||0}</td><td>${m.submitted||0}</td><td>${m.failed||0}</td><td>${m.pending||0}</td></tr>`).join('');document.getElementById('weekly').innerHTML=`<div class="panel"><h3>7 Hari: Task ${d.totals?.assignments||0} | Submit ${d.totals?.submitted||0} | Gagal ${d.totals?.failed||0}</h3><table><thead><tr><th>#</th><th>Node</th><th>Task</th><th>Submit</th><th>Gagal</th><th>Pending</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    async function nodeAction(name,action){if(['restart','stop'].includes(action)&&!confirm(`Yakin ${action} ${name}?`))return;showModal(`Running ${action} ${name}...`,'');try{const r=await api(`/api/vps/${encodeURIComponent(name)}/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});document.getElementById('modal-title').textContent=`✅ ${action} selesai`;document.getElementById('modal-content').innerHTML=`<pre>${esc(r.output||JSON.stringify(r,null,2))}</pre>`;await loadAll()}catch(e){document.getElementById('modal-title').textContent='❌ Gagal';document.getElementById('modal-content').innerHTML=`<pre>${esc(e.message)}</pre>`}}
    async function globalAction(action,confirmHard=false){if(confirmHard&&prompt('Ketik RESTART ALL untuk lanjut')!=='RESTART ALL')return;const out=document.getElementById('global-output');out.textContent='Running '+action+'...';try{const r=await api('/api/global-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});out.textContent=r.results.map(x=>`### ${x.name} (${x.host})\n${x.output||'(no output)'}`).join('\n\n');await loadAll()}catch(e){out.textContent='ERROR: '+e.message}}
    function mini(name){document.getElementById('modal-title').textContent='🧰 Mini Terminal '+name;document.getElementById('modal-sub').textContent='Pilih command aman';document.getElementById('modal-content').innerHTML=`<div class="toolbar"><select id="mini-cmd" class="select"><option value="status">Status service</option><option value="reward">Reward balance</option><option value="ram">RAM</option><option value="disk">Disk</option><option value="docker">Docker</option><option value="logs">Logs terbaru</option><option value="errors">Error 6 jam</option><option value="version">CLI version</option></select><button class="btn" onclick="runMini('${name}')">Run</button></div><pre id="mini-output">Pilih command lalu Run.</pre>`;document.getElementById('modal').classList.add('show')}
    async function runMini(name){const c=document.getElementById('mini-cmd').value,o=document.getElementById('mini-output');o.textContent='Running...';try{const r=await api(`/api/vps/${encodeURIComponent(name)}/mini-command`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:c})});o.textContent=r.output||'(no output)'}catch(e){o.textContent='ERROR: '+e.message}}
    function openVpsForm(mode,name='',host=''){editingName=mode==='edit'?name:null;showModal(mode==='edit'?'✏️ Edit VPS':'➕ Tambah VPS',mode==='edit'?name:'Isi data VPS baru');document.getElementById('modal-content').innerHTML=`<div class="form"><div class="notice">Password SSH hanya dipakai sekali untuk pasang SSH key. Password tidak disimpan. Kosongkan jika key sudah terpasang.</div><div class="form-row"><label>Nama VPS</label><input id="vps-name" class="form-input" placeholder="contoh: OptimAI_15" value="${esc(name)}"></div><div class="form-row"><label>Masukkan Host SSH</label><input id="vps-host" class="form-input" placeholder="contoh: root@1.2.3.4" value="${host}"></div><div class="form-row"><label>Masukkan Password SSH</label><input id="vps-pass" class="form-input" type="password" placeholder="kosongkan jika SSH key sudah ada"></div><div id="form-status" class="muted"></div><div class="form-actions"><button class="btn secondary" onclick="hideModal()">Batal</button><button class="btn ok" onclick="saveVpsForm()">Simpan</button></div></div>`}
    async function saveVpsForm(){const payload={name:document.getElementById('vps-name').value.trim(),host:document.getElementById('vps-host').value.trim(),password:document.getElementById('vps-pass').value};const s=document.getElementById('form-status');s.textContent='Menyimpan...';try{await api(editingName?'/api/vps/'+encodeURIComponent(editingName):'/api/vps',{method:editingName?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});await loadAll();hideModal();showPage('manage')}catch(e){s.textContent='❌ '+e.message}}
    async function deleteVps(name){if(!confirm('Yakin hapus '+name+'?'))return;try{await api('/api/vps/'+encodeURIComponent(name),{method:'DELETE'});await loadAll();showPage('manage')}catch(e){alert('Gagal hapus: '+e.message)}}
    async function detail(name){showModal('Loading detail...','');const n=await api('/api/vps/'+encodeURIComponent(name));document.getElementById('modal-title').textContent='🔎 Detail '+name;document.getElementById('modal-sub').textContent=n.host||'';document.getElementById('modal-content').innerHTML=`<div class="grid">${nodeCard(n)}</div><pre>${esc(JSON.stringify(n.system||{},null,2))}</pre>`}
    async function logs(name){showModal('Loading logs...','');const r=await api('/api/vps/'+encodeURIComponent(name)+'/logs');document.getElementById('modal-title').textContent='📜 Logs '+name;document.getElementById('modal-content').innerHTML=`<pre>${esc(r.output||'No logs')}</pre>`}
    async function logout(){if(!confirm('Keluar dari dashboard?'))return;try{await fetch('/api/logout',{method:'POST'})}catch(e){}location.href='/login'}function showModal(t,s){document.getElementById('modal-title').textContent=t;document.getElementById('modal-sub').textContent=s||'';document.getElementById('modal-content').innerHTML='';document.getElementById('modal').classList.add('show')}function hideModal(){document.getElementById('modal').classList.remove('show');editingName=null}function closeModal(e){if(e.target.id==='modal')hideModal()}loadAll();
  </script>
</body>
</html>
