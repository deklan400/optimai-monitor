<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - OptimAI Control</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eaf2ff;
      background: radial-gradient(circle at top left, #172554 0, transparent 34%), #090d16;
    }
    .card {
      width: min(440px, 100%);
      background: linear-gradient(180deg, rgba(30, 41, 59, .96), rgba(15, 23, 42, .98));
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 22px 60px rgba(0,0,0,.28);
    }
    .brand { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
      font-weight: 900;
    }
    h1 { margin: 0; font-size: 24px; }
    p { margin: 6px 0 0; color: #96a8c4; line-height: 1.55; }
    label { display: block; margin-top: 22px; margin-bottom: 8px; font-size: 13px; font-weight: 900; color: #bfdbfe; }
    input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, .24);
      background: rgba(15, 23, 42, .92);
      color: #eaf2ff;
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
      font-size: 16px;
    }
    input:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56,189,248,.12); }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    .hint {
      margin-top: 14px;
      border: 1px solid rgba(148, 163, 184, .18);
      background: rgba(56, 189, 248, .08);
      border-radius: 14px;
      padding: 12px;
      color: #dbeafe;
      font-size: 13px;
    }
    .status { margin-top: 14px; min-height: 20px; color: #fca5a5; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">O</div>
      <div>
        <h1>OptimAI Control</h1>
        <p>Login dashboard pakai ID Telegram yang terdaftar di bot.</p>
      </div>
    </div>

    <form id="login-form">
      <label for="telegram-id">ID Telegram</label>
      <input id="telegram-id" name="telegram_id" inputmode="numeric" autocomplete="username" placeholder="contoh: 123456789" required />
      <button type="submit">Masuk Dashboard</button>
    </form>

    <div class="hint">
      ID harus sama dengan <b>CHAT_ID</b> / <b>DASHBOARD_ALLOWED_TELEGRAM_IDS</b> di file <b>.env</b> VPS monitor.
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const status = document.getElementById('status');
      const telegramId = document.getElementById('telegram-id').value.trim();
      status.textContent = 'Memeriksa ID Telegram...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id: telegramId })
        });

        if (!res.ok) {
          let message = await res.text();
          try { message = JSON.parse(message).detail || message; } catch(e) {}
          throw new Error(message);
        }

        status.style.color = '#86efac';
        status.textContent = 'Login berhasil. Membuka dashboard...';
        window.location.href = '/';
      } catch (err) {
        status.style.color = '#fca5a5';
        status.textContent = 'Login gagal: ' + err.message;
      }
    });
  </script>
</body>
</html>
